apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloudnative-metadata-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-go
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: cloud-go
  template:
    metadata:
      labels:
        app: cloud-go
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: cloud-go
          image: cloud-go:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          env:
            - name: LOG_PATH
              value: /data/metadata/events.jsonl
          volumeMounts:
            - name: metadata-volume
              mountPath: /data/metadata
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 5
      volumes:
        - name: metadata-volume
          persistentVolumeClaim:
            claimName: cloudnative-metadata-pvc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloud-go-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloud-go
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-go-service
spec:
  type: LoadBalancer
  selector:
    app: cloud-go
  ports:
    - port: 7001
      targetPort: 8080